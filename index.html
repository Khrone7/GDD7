<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GDD – Canvas Infini</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
</head>

<body>

<div id="sidebar">
  <div id="toggleMenu">≡</div>

  <div class="tool" id="addText">
    <div class="tool-icon">📝</div>
    <div>Ajouter du texte</div>
  </div>

  <div class="tool" id="addShape">
    <div class="tool-icon">⬛</div>
    <div>Ajouter une forme</div>
  </div>

  <div class="tool" id="addImage">
    <div class="tool-icon">🖼️</div>
    <div>Importer une image</div>
  </div>

  <div class="tool" id="newPage">
    <div class="tool-icon">📄</div>
    <div>Nouvelle page</div>
  </div>

  <div class="tool" id="toggleDark">
    <div class="tool-icon">🌙</div>
    <div>Mode sombre</div>
  </div>

  <h3>Pages</h3>
  <div id="pageList"></div>
</div>

<div id="viewport">
  <div id="canvas"></div>
</div>

<canvas id="minimap"></canvas>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

</body>
</html>
