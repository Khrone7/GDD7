<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GDD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GDD">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="sidebar">
  <div id="toggleMenu">☰</div>

  <div class="tool" id="addText" title="Texte">✏️</div>

  <div class="tool has-submenu" id="addShape" title="Forme">
    ⬛
    <div class="submenu" id="shapeMenu">
      <div class="shape-opt" data-shape="rect">⬛ Rectangle</div>
      <div class="shape-opt" data-shape="circle">⭕ Cercle</div>
      <div class="shape-opt" data-shape="triangle">🔺 Triangle</div>
      <div class="shape-opt" data-shape="diamond">🔷 Losange</div>
      <div class="shape-opt" data-shape="arrow">➡️ Flèche</div>
    </div>
  </div>

  <div class="tool" id="addImage" title="Image">🖼️</div>
  <div class="tool" id="addChecklist" title="Checklist">☑️</div>

  <div class="sidebar-divider"></div>

  <div class="tool" id="selectMode" title="Sélectionner / grouper">🖱️</div>
  <div class="tool" id="linkMode" title="Connecteur">🔗</div>
  <div class="tool" id="tagMode" title="Étiquette">🏷️</div>

  <div class="sidebar-divider"></div>

  <div class="tool" id="undoBtn" title="Annuler">↩️</div>
  <div class="tool" id="redoBtn" title="Rétablir">↪️</div>

  <div class="sidebar-divider"></div>

  <div class="tool" id="newPage" title="Nouvelle page">📄</div>
  <div class="tool" id="exportPdf" title="Exporter en PDF">📤</div>
  <div class="tool" id="toggleDark" title="Mode sombre">🌙</div>

  <div id="pageListWrap">
    <div id="pageListLabel">Pages</div>
    <div id="pageList"></div>
  </div>
</div>

<div id="viewport">
  <svg id="linksLayer"></svg>
  <div id="canvas"></div>
</div>

<!-- Bandeau mode actif (sélection / connecteur / étiquette) -->
<div id="modeBanner">
  <span id="modeBannerText"></span>
  <button id="modeBannerCancel">Annuler</button>
</div>

<!-- Barre d'action flottante quand sélection multiple active -->
<div id="selectionBar">
  <span id="selectionCount">0 sélectionné(s)</span>
  <button id="groupBtn">Grouper</button>
  <button id="ungroupBtn">Dégrouper</button>
</div>

<!-- Panneau couleur flottant -->
<div id="colorPanel">
  <div class="color-swatch" data-color="#4A90D9"></div>
  <div class="color-swatch" data-color="#E74C3C"></div>
  <div class="color-swatch" data-color="#2ECC71"></div>
  <div class="color-swatch" data-color="#F39C12"></div>
  <div class="color-swatch" data-color="#9B59B6"></div>
  <div class="color-swatch" data-color="#1ABC9C"></div>
  <div class="color-swatch" data-color="#E8E8FF"></div>
  <div class="color-swatch" data-color="#1a1a1a"></div>
  <div class="color-swatch" data-color="#FFFFFF" style="border:1.5px solid #ccc"></div>
</div>

<!-- Panneau étiquette flottant -->
<div id="tagPanel">
  <input type="text" id="tagInput" placeholder="Texte de l'étiquette" maxlength="24">
  <div class="tag-colors">
    <div class="color-swatch tag-color" data-color="#E74C3C"></div>
    <div class="color-swatch tag-color" data-color="#F39C12"></div>
    <div class="color-swatch tag-color" data-color="#2ECC71"></div>
    <div class="color-swatch tag-color" data-color="#4A90D9"></div>
    <div class="color-swatch tag-color" data-color="#9B59B6"></div>
    <div class="color-swatch tag-color" data-color="#888888"></div>
  </div>
  <div class="tag-actions">
    <button id="tagRemove">Retirer l'étiquette</button>
    <button id="tagDone">OK</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<script src="app.js"></script>
</body>
</html>
