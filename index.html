<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GDD – Canvas Infini</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #e6e6e6;
  }

  /* MENU LATERAL LARGE */
  #sidebar {
    width: 260px;
    height: 100vh;
    background: #ffffff;
    border-right: 1px solid #ccc;
    padding: 20px;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .tool {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px;
    background: #f5f5f5;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #ddd;
  }

  .tool:hover {
    background: #e9e9e9;
  }

  .tool-icon {
    font-size: 20px;
  }

  /* CANVAS INFINI */
  #viewport {
    position: absolute;
    left: 260px;
    top: 0;
    width: calc(100vw - 260px);
    height: 100vh;
    overflow: hidden;
    cursor: grab;
  }

  #canvas {
    width: 50000px;
    height: 50000px;
    background: #fafafa;
    position: relative;
    transform-origin: 0 0;
  }

  /* ELEMENTS */
  .node, .shape, .img-item {
    position: absolute;
    padding: 10px;
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    cursor: move;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .node[contenteditable="true"] {
    outline: none;
  }

  .shape {
    width: 150px;
    height: 80px;
    background: #dfe8ff;
  }

  .page-selector {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    cursor: pointer;
  }

  .page-selector:hover {
    background: #e9e9e9;
  }
</style>
</head>

<body>

<!-- MENU LATERAL -->
<div id="sidebar">

  <div class="tool" id="addText">
    <div class="tool-icon">📝</div>
    <div>Ajouter du texte</div>
  </div>

  <div class="tool" id="addShape">
    <div class="tool-icon">⬛</div>
    <div>Ajouter une forme</div>
  </div>

  <div class="tool" id="addImage">
    <div class="tool-icon">🖼️</div>
    <div>Importer une image</div>
  </div>

  <div class="tool" id="newPage">
    <div class="tool-icon">📄</div>
    <div>Nouvelle page</div>
  </div>

  <h3>Pages</h3>
  <div id="pageList"></div>

</div>

<!-- CANVAS -->
<div id="viewport">
  <div id="canvas"></div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
/* ------------------------------
   SYSTEME DE PAGES
--------------------------------*/
let pages = JSON.parse(localStorage.getItem("gdd_pages") || "{}");
let currentPage = null;

function savePages() {
  localStorage.setItem("gdd_pages", JSON.stringify(pages));
}

function loadPage(name) {
  currentPage = name;
  canvas.innerHTML = "";
  if (!pages[name]) pages[name] = [];
  pages[name].forEach(el => restoreElement(el));
  refreshPageList();
  savePages();
}

function refreshPageList() {
  pageList.innerHTML = "";
  Object.keys(pages).forEach(name => {
    const div = document.createElement("div");
    div.className = "page-selector";
    div.textContent = name;
    div.onclick = () => loadPage(name);
    pageList.appendChild(div);
  });
}

function createPage() {
  const name = "Page " + (Object.keys(pages).length + 1);
  pages[name] = [];
  loadPage(name);
}

/* ------------------------------
   CANVAS INFINI
--------------------------------*/
let offsetX = -24000;
let offsetY = -24000;
let scale = 1;
let isPanning = false;
let startX = 0, startY = 0;

function updateTransform() {
  canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

viewport.addEventListener("mousedown", e => {
  if (e.target !== viewport) return;
  isPanning = true;
  viewport.style.cursor = "grabbing";
  startX = e.clientX - offsetX;
  startY = e.clientY - offsetY;
});

window.addEventListener("mousemove", e => {
  if (!isPanning) return;
  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;
  updateTransform();
});

window.addEventListener("mouseup", () => {
  isPanning = false;
  viewport.style.cursor = "grab";
});

viewport.addEventListener("wheel", e => {
  e.preventDefault();
  const zoomFactor = 1.1;
  const oldScale = scale;
  scale *= e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
  scale = Math.min(Math.max(scale, 0.2), 3);
  updateTransform();
}, { passive: false });

/* ------------------------------
   CREATION D’ELEMENTS
--------------------------------*/
function makeDraggable(el, data) {
  let dragging = false;
  let sx = 0, sy = 0, ex = 0, ey = 0;

  el.addEventListener("mousedown", e => {
    dragging = true;
    sx = e.clientX;
    sy = e.clientY;
    ex = parseFloat(el.style.left);
    ey = parseFloat(el.style.top);
    e.stopPropagation();
  });

  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const dx = (e.clientX - sx) / scale;
    const dy = (e.clientY - sy) / scale;
    el.style.left = ex + dx + "px";
    el.style.top = ey + dy + "px";
  });

  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    saveCurrentPage();
  });
}

function saveCurrentPage() {
  if (!currentPage) return;
  pages[currentPage] = [...canvas.children].map(el => ({
    type: el.dataset.type,
    x: parseFloat(el.style.left),
    y: parseFloat(el.style.top),
    text: el.innerHTML,
    width: el.style.width,
    height: el.style.height,
    src: el.dataset.src || null
  }));
  savePages();
}

function restoreElement(data) {
  if (data.type === "text") {
    createText(data.x, data.y, data.text);
  }
  if (data.type === "shape") {
    createShape(data.x, data.y);
  }
  if (data.type === "image") {
    createImage(data.x, data.y, data.src);
  }
}

function createText(x, y, content = "Double-clique pour écrire") {
  const el = document.createElement("div");
  el.className = "node";
  el.dataset.type = "text";
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.contentEditable = true;
  el.innerHTML = content;
  canvas.appendChild(el);
  makeDraggable(el);
  el.oninput = saveCurrentPage;
}

function createShape(x, y) {
  const el = document.createElement("div");
  el.className = "shape";
  el.dataset.type = "shape";
  el.style.left = x + "px";
  el.style.top = y + "px";
  canvas.appendChild(el);
  makeDraggable(el);
}

function createImage(x, y, src) {
  const el = document.createElement("img");
  el.className = "img-item";
  el.dataset.type = "image";
  el.dataset.src = src;
  el.src = src;
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.style.width = "200px";
  canvas.appendChild(el);
  makeDraggable(el);
}

/* ------------------------------
   BOUTONS DU MENU
--------------------------------*/
addText.onclick = () => createText(25000, 25000);
addShape.onclick = () => createShape(25000, 25000);

addImage.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);
  createImage(25000, 25000, url);
  saveCurrentPage();
};

newPage.onclick = () => createPage();

/* ------------------------------
   INITIALISATION
--------------------------------*/
if (Object.keys(pages).length === 0) {
  createPage();
} else {
  loadPage(Object.keys(pages)[0]);
}

updateTransform();
</script>

</body>
</html>
