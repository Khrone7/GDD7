<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GDD – Canvas infini</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
  }

  /* Barre d’outils */
  #toolbar {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(20,20,20,0.9);
    padding: 10px;
    border-radius: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
  }

  #toolbar button {
    background: #333;
    color: #eee;
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }

  #toolbar button:hover {
    background: #555;
  }

  #zoomDisplay {
    font-size: 12px;
    opacity: 0.8;
  }

  /* Canvas infini */
  #viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: grab;
  }

  #canvas {
    width: 50000px;   /* très grand plan de travail */
    height: 50000px;
    background: radial-gradient(circle, #222 0, #000 60%);
    position: relative;
    transform-origin: 0 0;
  }

  .node {
    position: absolute;
    min-width: 150px;
    min-height: 60px;
    padding: 8px;
    background: #222;
    color: #eee;
    border-radius: 8px;
    border: 1px solid #555;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    cursor: move;
  }

  .node[contenteditable="true"] {
    outline: none;
  }

  .node-header {
    font-size: 11px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }

  .node-body {
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="addNode">+ Bulle de texte</button>
  <span id="zoomDisplay">Zoom : 100%</span>
</div>

<div id="viewport">
  <div id="canvas"></div>
</div>

<script>
  const viewport = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  const addNodeBtn = document.getElementById('addNode');
  const zoomDisplay = document.getElementById('zoomDisplay');

  // Position et zoom
  let offsetX = -24000; // on commence au milieu du grand canvas
  let offsetY = -24000;
  let scale = 1;

  let isPanning = false;
  let startPanX = 0;
  let startPanY = 0;

  function updateTransform() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    zoomDisplay.textContent = `Zoom : ${Math.round(scale * 100)}%`;
  }

  updateTransform();

  // Pan (déplacement dans le canvas)
  viewport.addEventListener('mousedown', (e) => {
    // ne pas déclencher le pan si on clique sur un node
    if (e.target.classList.contains('node') || e.target.closest('.node')) return;
    isPanning = true;
    viewport.style.cursor = 'grabbing';
    startPanX = e.clientX - offsetX;
    startPanY = e.clientY - offsetY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    offsetX = e.clientX - startPanX;
    offsetY = e.clientY - startPanY;
    updateTransform();
  });

  window.addEventListener('mouseup', () => {
    isPanning = false;
    viewport.style.cursor = 'grab';
  });

  // Zoom à la molette
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomFactor = 1.1;
    const oldScale = scale;

    if (e.deltaY < 0) {
      scale *= zoomFactor;
    } else {
      scale /= zoomFactor;
    }

    scale = Math.min(Math.max(scale, 0.2), 3);

    // zoom centré sur le pointeur
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const dx = mx - offsetX;
    const dy = my - offsetY;

    offsetX = mx - dx * (scale / oldScale);
    offsetY = my - dy * (scale / oldScale);

    updateTransform();
  }, { passive: false });

  // Création d’une bulle de texte
  addNodeBtn.addEventListener('click', () => {
    createNode(25000, 25000, "Nouvelle note", "Double-clique pour éditer le texte…");
  });

  function createNode(x, y, title, text) {
    const node = document.createElement('div');
    node.className = 'node';
    node.style.left = x + 'px';
    node.style.top = y + 'px';

    const header = document.createElement('div');
    header.className = 'node-header';
    header.textContent = title;

    const body = document.createElement('div');
    body.className = 'node-body';
    body.textContent = text;
    body.setAttribute('contenteditable', 'true');

    node.appendChild(header);
    node.appendChild(body);
    canvas.appendChild(node);

    makeNodeDraggable(node);
  }

  function makeNodeDraggable(node) {
    let dragging = false;
    let startX = 0, startY = 0;
    let nodeX = 0, nodeY = 0;

    node.addEventListener('mousedown', (e) => {
      dragging = true;
      e.stopPropagation(); // ne pas déclencher le pan
      startX = e.clientX;
      startY = e.clientY;
      nodeX = parseFloat(node.style.left);
      nodeY = parseFloat(node.style.top);
      node.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = (e.clientX - startX) / scale;
      const dy = (e.clientY - startY) / scale;
      node.style.left = (nodeX + dx) + 'px';
      node.style.top = (nodeY + dy) + 'px';
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      node.style.cursor = 'move';
    });
  }

  // Une première bulle au centre
  createNode(25000, 25000, "GDD – Vue globale", "Commence à poser tes idées ici…");
</script>

</body>
</html>
