tap(exportPdfBtn, async () => {
  if (!window.jspdf) { alert("Le module d'export n'a pas pu se charger (connexion internet ?)."); return; }
  const items = [...canvas.querySelectorAll(".node,.shape-el,.img-wrapper,.checklist-el,.group-frame")];
  if (!items.length) { alert("Cette page est vide."); return; }

  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  items.forEach(el => {
    const x=parseFloat(el.style.left)||0, y=parseFloat(el.style.top)||0;
    const w=parseFloat(el.style.width)||el.offsetWidth||140, h=parseFloat(el.style.height)||el.offsetHeight||80;
    if(x<mnX)mnX=x; if(y<mnY)mnY=y; if(x+w>mxX)mxX=x+w; if(y+h>mxY)mxY=y+h;
  });
  const pad = 40;
  mnX-=pad; mnY-=pad; mxX+=pad; mxY+=pad;
  const contentW = mxX-mnX, contentH = mxY-mnY;

  const scaleExport = 2;
  const exportCanvas = document.createElement("canvas");
  exportCanvas.width = contentW*scaleExport; exportCanvas.height = contentH*scaleExport;
  const ctx = exportCanvas.getContext("2d");
  ctx.scale(scaleExport, scaleExport);
  ctx.fillStyle = document.body.classList.contains("dark") ? "#1e1e1e" : "#ffffff";
  ctx.fillRect(0,0,contentW,contentH);

  ctx.strokeStyle = "#9b9bdc"; ctx.fillStyle = "#9b9bdc"; ctx.lineWidth = 2;
  linksLayer.querySelectorAll("g[data-from] line").forEach(line => {
    const x1=parseFloat(line.getAttribute("x1"))-mnX, y1=parseFloat(line.getAttribute("y1"))-mnY;
    const x2=parseFloat(line.getAttribute("x2"))-mnX, y2=parseFloat(line.getAttribute("y2"))-mnY;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    const angle = Math.atan2(y2-y1, x2-x1);
    const hl=9, hw=5.5;
    const bx=x2-Math.cos(angle)*hl, by=y2-Math.sin(angle)*hl;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(bx+Math.cos(angle+Math.PI/2)*hw, by+Math.sin(angle+Math.PI/2)*hw);
    ctx.lineTo(bx+Math.cos(angle-Math.PI/2)*hw, by+Math.sin(angle-Math.PI/2)*hw);
    ctx.closePath(); ctx.fill();
  });

  for (const el of items) {
    const x=(parseFloat(el.style.left)||0)-mnX, y=(parseFloat(el.style.top)||0)-mnY;
    const w=parseFloat(el.style.width)||el.offsetWidth||140, h=parseFloat(el.style.height)||el.offsetHeight||60;
    const type = el.dataset.type;

    if (el.classList.contains("group-frame")) {
      ctx.save();
      ctx.strokeStyle = el.dataset.color || "#9b9bdc"; ctx.setLineDash([5,4]); ctx.lineWidth = 1.5;
      ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
      ctx.fillStyle = el.dataset.color || "#6a6ad9"; ctx.font = "bold 11px Arial";
      ctx.fillText(el.dataset.label || "Groupe", x, y-8);
      ctx.restore();
      continue;
    }
    if (type === "text") {
      ctx.save();
      ctx.fillStyle="#ffffff"; ctx.strokeStyle="#e8e8e8"; ctx.lineWidth=1;
      roundRectPath(ctx,x,y,w,h,10); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#1a1a1a";
      const fs = parseInt(el.dataset.fontSize)||16;
      ctx.font = fs+"px Arial";
      wrapCanvasText(ctx, el.innerText||"", x+12, y+fs+6, w-24, fs*1.3);
      ctx.restore();
    } else if (type === "shape") {
      ctx.save();
      const color = el.dataset.color || "#4A90D9", shape = el.dataset.shape;
      const cx=x+w/2, cy=y+h/2, rot=(parseFloat(el.dataset.rotation)||0)*Math.PI/180;
      ctx.translate(cx,cy); ctx.rotate(rot); ctx.translate(-cx,-cy);
      ctx.fillStyle = color;
      if (shape==="circle") { ctx.beginPath(); ctx.ellipse(cx,cy,w/2,h/2,0,0,Math.PI*2); ctx.fill(); }
      else if (shape==="triangle") { ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h); ctx.closePath(); ctx.fill(); }
      else if (shape==="arrow") { ctx.strokeStyle=color; ctx.lineWidth=Math.max(2,h*0.15); ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x+w*0.75,cy); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x+w,cy); ctx.lineTo(x+w*0.65,y); ctx.lineTo(x+w*0.65,y+h); ctx.closePath(); ctx.fill(); }
      else { roundRectPath(ctx,x,y,w,h,shape==="diamond"?0:8); ctx.fill(); }
      ctx.restore();
    } else if (type === "image") {
      try { ctx.drawImage(el.querySelector("img"), x, y, w, h); } catch(e) {}
    } else if (type === "checklist") {
      ctx.save();
      ctx.fillStyle = el.dataset.bg||"#fffdf2"; ctx.strokeStyle = el.dataset.border||"#f0e6c0"; ctx.lineWidth=1;
      roundRectPath(ctx,x,y,w,h,10); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#8a7a3a"; ctx.font = "bold 11px Arial";
      const title = el.querySelector(".checklist-title")?.value || "Checklist";
      ctx.fillText(title.toUpperCase(), x+12, y+18);
      let cy2 = y+36;
      el.querySelectorAll(":scope > .checklist-items > .checklist-item").forEach(row => {
        const done = row.classList.contains("done");
        const txt  = row.querySelector(".ci-text")?.innerText || "";
        ctx.strokeStyle="#999"; ctx.lineWidth=1.3; ctx.strokeRect(x+12,cy2-9,12,12);
        if (done) { ctx.beginPath(); ctx.moveTo(x+14,cy2-3); ctx.lineTo(x+17,cy2); ctx.lineTo(x+23,cy2-8); ctx.stroke(); }
        ctx.fillStyle = done?"#aaa":"#333"; ctx.font = (done?"italic ":"")+"12px Arial";
        ctx.fillText(txt.slice(0,40), x+30, cy2+1);
        cy2 += 18;
        const note = row.querySelector(".ci-note")?.innerText || "";
        if (note) { ctx.fillStyle="#aaa"; ctx.font="italic 10px Arial"; ctx.fillText(note.slice(0,46), x+30, cy2); cy2 += 14; }
        row.querySelectorAll(".checklist-sub .checklist-item").forEach(sub => {
          const sdone = sub.classList.contains("done");
          const stxt = sub.querySelector(".ci-text")?.innerText || "";
          ctx.strokeStyle="#aaa"; ctx.lineWidth=1; ctx.strokeRect(x+34,cy2-8,10,10);
          ctx.fillStyle = sdone?"#bbb":"#555"; ctx.font = "11px Arial";
          ctx.fillText(stxt.slice(0,36), x+50, cy2+1);
          cy2 += 16;
        });
      });
      ctx.restore();
    }
    if (el.dataset.tag) {
      ctx.save();
      ctx.fillStyle = el.dataset.tagColor || "#888";
      ctx.font = "bold 10px Arial";
      const tagW = ctx.measureText(el.dataset.tag).width + 16;
      roundRectPath(ctx,x+6,y-10,tagW,16,8); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.fillText(el.dataset.tag, x+14, y+1);
      ctx.restore();
    }
  }

  const imgData = exportCanvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const orientation = contentW > contentH ? "landscape" : "portrait";
  const pdf = new jsPDF({ orientation, unit:"pt", format:[contentW, contentH] });
  pdf.addImage(imgData, "PNG", 0, 0, contentW, contentH);
  pdf.save((currentPage||"page").replace(/[^a-z0-9_\- ]/gi,"")+".pdf");
});

function roundRectPath(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight) {
  const words = text.split(/\s+/); let line="", yy=y;
  words.forEach(word => {
    const test = line ? line+" "+word : word;
    if (ctx.measureText(test).width > maxWidth && line) { ctx.fillText(line,x,yy); line=word; yy+=lineHeight; }
    else line = test;
  });
  if (line) ctx.fillText(line,x,yy);
}

let scene, camera, renderer, character, glowParticles;

function initCharacter3D() {
  const canvasEl = document.getElementById('characterCanvas');
  if (!canvasEl || !window.THREE) return;

  const w = canvasEl.clientWidth || 280;
  const h = canvasEl.clientHeight || 380;

  const isDark = document.body.classList.contains("dark");
  const bgColor = isDark ? 0x1a160f : 0x14110c; // fond sombre comme l'image, même en clair (le perso brille mieux)

  scene = new THREE.Scene();
  scene.background = new THREE.Color(bgColor);
  scene.fog = new THREE.Fog(bgColor, 6, 16);

  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
  camera.position.set(0, 0.3, 6);
  camera.lookAt(0, 0.2, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  canvasEl.appendChild(renderer.domElement);

  // Lumières : ambiance sombre + lueur dorée venant de la tête
  scene.add(new THREE.AmbientLight(0x40361f, 0.7));
  const headLight = new THREE.PointLight(0xffd766, 2.2, 12);
  headLight.position.set(0, 1.1, 0.5);
  scene.add(headLight);
  const rimLight = new THREE.DirectionalLight(0xffb74a, 0.6);
  rimLight.position.set(-2, 1, 2);
  scene.add(rimLight);

  character = new THREE.Group();
  scene.add(character);

  // ---- CORPS : silhouette sombre, fine, façon petite créature ----
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x1c1710, roughness: 0.9, metalness: 0.1 });

  // tronc (cône inversé légèrement bombé)
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.42, 1.0, 12), darkMat);
  torso.position.y = -0.35;
  character.add(torso);

  // épaules
  const shoulders = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12, 12), darkMat);
  shoulders.position.y = 0.15; shoulders.scale.set(1.1, 0.7, 0.9);
  character.add(shoulders);

  // bras levé (comme s'il tendait la main vers la lumière)
  const armUp = new THREE.Group();
  const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.1, 0.5, 8), darkMat);
  upperArm.position.set(0.32, 0.05, 0.1); upperArm.rotation.z = -0.9;
  armUp.add(upperArm);
  const foreArm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.45, 8), darkMat);
  foreArm.position.set(0.6, 0.35, 0.15); foreArm.rotation.z = -0.3;
  armUp.add(foreArm);
  character.add(armUp);

  // bras au repos
  const armDown = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.7, 8), darkMat);
  armDown.position.set(-0.34, -0.2, 0.05); armDown.rotation.z = 0.25;
  character.add(armDown);

  // petites jambes
  const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.4, 8), darkMat);
  legL.position.set(-0.15, -1.05, 0); character.add(legL);
  const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.4, 8), darkMat);
  legR.position.set(0.15, -1.05, 0); character.add(legR);

  // ---- TÊTE LUMINEUSE : noyau + flammes de cristal dorées ----
  const headGroup = new THREE.Group();
  headGroup.position.y = 0.62;
  character.add(headGroup);

  // noyau brillant (cœur de la "flamme")
  const coreMat = new THREE.MeshStandardMaterial({
    color: 0xfff4d0, emissive: 0xffd766, emissiveIntensity: 1.0, roughness: 0.3, metalness: 0.2
  });
  const core = new THREE.Mesh(new THREE.SphereGeometry(0.32, 20, 20), coreMat);
  headGroup.add(core);

  // halo translucide autour du noyau
  const haloMat = new THREE.MeshBasicMaterial({ color: 0xffcb52, transparent: true, opacity: 0.18 });
  const halo = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), haloMat);
  headGroup.add(halo);

  // flammes de cristal : cônes dorés émissifs pointant vers le haut/extérieur
  const flameMat = new THREE.MeshStandardMaterial({
    color: 0xffe08a, emissive: 0xffba38, emissiveIntensity: 0.9, roughness: 0.25, metalness: 0.3,
    transparent: true, opacity: 0.92, flatShading: true
  });
  const flames = [];
  const flameCount = 11;
  for (let i = 0; i < flameCount; i++) {
    const ang = (i / flameCount) * Math.PI * 2;
    const tall = 0.4 + Math.random() * 0.45;
    const flame = new THREE.Mesh(new THREE.ConeGeometry(0.1, tall, 5), flameMat);
    const radius = 0.22;
    flame.position.set(Math.cos(ang) * radius, 0.25 + tall * 0.35, Math.sin(ang) * radius * 0.5);
    // incliner vers l'extérieur, pointe vers le haut
    flame.rotation.z = -Math.cos(ang) * 0.5;
    flame.rotation.x = Math.sin(ang) * 0.3;
    flame.userData.baseScale = 1;
    flame.userData.phase = Math.random() * Math.PI * 2;
    headGroup.add(flame);
    flames.push(flame);
  }
  // une grande flamme centrale qui pointe droit
  const mainFlame = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.95, 6), flameMat);
  mainFlame.position.y = 0.6;
  mainFlame.userData.phase = 0; mainFlame.userData.baseScale = 1;
  headGroup.add(mainFlame);
  flames.push(mainFlame);

  // ---- YEUX noirs ronds ----
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x100c06 });
  const eyeGeo = new THREE.SphereGeometry(0.07, 10, 10);
  const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
  eye1.position.set(-0.12, -0.02, 0.29); headGroup.add(eye1);
  const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
  eye2.position.set(0.12, -0.02, 0.29); headGroup.add(eye2);

  // ---- ÉTINCELLES dorées flottantes ----
  const sparkGeo = new THREE.BufferGeometry();
  const sparkCount = 60;
  const positions = new Float32Array(sparkCount * 3);
  const sparkData = [];
  for (let i = 0; i < sparkCount; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = 0.6 + Math.random() * 1.6;
    const yy = 0.2 + Math.random() * 1.6;
    positions[i*3] = Math.cos(ang) * rad;
    positions[i*3+1] = yy;
    positions[i*3+2] = Math.sin(ang) * rad;
    sparkData.push({ ang, rad, baseY: yy, speed: 0.2 + Math.random() * 0.5 });
  }
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const sparkMat = new THREE.PointsMaterial({ color: 0xffd766, size: 0.06, sizeAttenuation: true, transparent: true, opacity: 0.9 });
  glowParticles = new THREE.Points(sparkGeo, sparkMat);
  scene.add(glowParticles);

  // ---- ANIMATION ----
  let t = 0;
  const animate = () => {
    requestAnimationFrame(animate);
    t += 0.016;
    // léger balancement du perso plutôt qu'une rotation complète (plus naturel)
    character.rotation.y = Math.sin(t * 0.5) * 0.5;
    headGroup.position.y = 0.62 + Math.sin(t * 1.5) * 0.02;
    // flammes qui vacillent
    flames.forEach(f => {
      const s = 1 + Math.sin(t * 4 + f.userData.phase) * 0.12;
      f.scale.y = s;
    });
    halo.scale.setScalar(1 + Math.sin(t * 2) * 0.06);
    headLight.intensity = 2.2 + Math.sin(t * 3) * 0.4;
    // étincelles qui montent en spirale
    const pos = glowParticles.geometry.attributes.position.array;
    sparkData.forEach((sp, i) => {
      sp.ang += 0.003 * sp.speed * 4;
      let y = pos[i*3+1] + sp.speed * 0.004;
      if (y > 2.0) y = 0.2;
      pos[i*3] = Math.cos(sp.ang) * sp.rad;
      pos[i*3+1] = y;
      pos[i*3+2] = Math.sin(sp.ang) * sp.rad;
    });
    glowParticles.geometry.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
  };
  animate();
}

// Initialiser au premier rendu du projectScreen
const observer = new MutationObserver(mutations => {
  if (document.body.classList.contains('no-project') && !renderer) {
    setTimeout(() => initCharacter3D(), 50);
  }
});
observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

// Cas du tout premier chargement : la classe no-project est déjà présente
if (document.body.classList.contains('no-project') && !renderer) {
  setTimeout(() => initCharacter3D(), 80);
}


</script>
</body>
