<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GDD – Canvas Infini</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GDD">
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU LATERAL -->
<div id="sidebar">
  <div id="toggleMenu">≡</div>

  <div class="tool" id="addText">
    <div class="tool-icon">📝</div>
    <span class="tool-label">Ajouter du texte</span>
  </div>

  <div class="tool" id="addShape">
    <div class="tool-icon">⬛</div>
    <span class="tool-label">Ajouter une forme</span>
  </div>

  <div class="tool" id="addImage">
    <div class="tool-icon">🖼️</div>
    <span class="tool-label">Importer une image</span>
  </div>

  <div class="tool" id="newPage">
    <div class="tool-icon">📄</div>
    <span class="tool-label">Nouvelle page</span>
  </div>

  <div class="tool" id="toggleDark">
    <div class="tool-icon">🌙</div>
    <span class="tool-label">Mode sombre</span>
  </div>

  <h3>Pages</h3>
  <div id="pageList"></div>
</div>

<!-- CANVAS -->
<div id="viewport">
  <div id="canvas"></div>
</div>

<!-- IMPORT IMAGE -->
<input type="file" id="fileInput" accept="image/*" style="display:none">

<script src="app.js"></script>
</body>
</html>
