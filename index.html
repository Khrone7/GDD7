<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GDD – Canvas Infini</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<style>
/* ------------------------------
   STYLE GLOBAL
--------------------------------*/
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #e6e6e6;
  touch-action: none; /* empêche Safari de zoomer / scroller */
}

/* ------------------------------
   MENU LATERAL LARGE
--------------------------------*/
#sidebar {
  width: 260px;
  height: 100vh;
  background: #ffffff;
  border-right: 1px solid #ccc;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.tool {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid #ddd;
  user-select: none;
}

.tool:hover {
  background: #e9e9e9;
}

.tool-icon {
  font-size: 20px;
}

/* ------------------------------
   CANVAS INFINI
--------------------------------*/
#viewport {
  position: absolute;
  left: 260px;
  top: 0;
  width: calc(100vw - 260px);
  height: 100vh;
  overflow: hidden;
  cursor: grab;
  touch-action: none;
}

#canvas {
  width: 50000px;
  height: 50000px;
  background: #fafafa;
  position: relative;
  transform-origin: 0 0;
}

/* ------------------------------
   ELEMENTS
--------------------------------*/
.node, .shape, .img-item {
  position: absolute;
  padding: 10px;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  cursor: move;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  user-select: none;
}

.node[contenteditable="true"] {
  outline: none;
}

.shape {
  width: 150px;
  height: 80px;
  background: #dfe8ff;
}

.img-item {
  width: 200px;
  height: auto;
}

/* ------------------------------
   MINI-MAP
--------------------------------*/
#minimap {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 160px;
  height: 160px;
  background: rgba(255,255,255,0.8);
  border: 1px solid #ccc;
  border-radius: 8px;
  z-index: 20;
}

/* ------------------------------
   MODE SOMBRE
--------------------------------*/
.dark body {
  background: #111;
}

.dark #sidebar {
  background: #222;
  color: white;
}

.dark .tool {
  background: #333;
  border-color: #444;
}

.dark #canvas {
  background: #222;
}

.dark .node, .dark .shape {
  background: #333;
  color: white;
  border-color: #555;
}
</style>
</head>

<body>

<!-- MENU LATERAL -->
<div id="sidebar">

  <div class="tool" id="addText">
    <div class="tool-icon">📝</div>
    <div>Ajouter du texte</div>
  </div>

  <div class="tool" id="addShape">
    <div class="tool-icon">⬛</div>
    <div>Ajouter une forme</div>
  </div>

  <div class="tool" id="addImage">
    <div class="tool-icon">🖼️</div>
    <div>Importer une image</div>
  </div>

  <div class="tool" id="newPage">
    <div class="tool-icon">📄</div>
    <div>Nouvelle page</div>
  </div>

  <div class="tool" id="toggleDark">
    <div class="tool-icon">🌙</div>
    <div>Mode sombre</div>
  </div>

  <h3>Pages</h3>
  <div id="pageList"></div>

</div>

<!-- CANVAS -->
<div id="viewport">
  <div id="canvas"></div>
</div>

<!-- MINI-MAP -->
<canvas id="minimap"></canvas>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
/* ------------------------------
   SYSTEME DE PAGES
--------------------------------*/
let pages = JSON.parse(localStorage.getItem("gdd_pages") || "{}");
let currentPage = null;

function savePages() {
  localStorage.setItem("gdd_pages", JSON.stringify(pages));
}

function loadPage(name) {
  currentPage = name;
  canvas.innerHTML = "";
  if (!pages[name]) pages[name] = [];
  pages[name].forEach(el => restoreElement(el));
  refreshPageList();
  savePages();
}

function refreshPageList() {
  pageList.innerHTML = "";
  Object.keys(pages).forEach(name => {
    const div = document.createElement("div");
    div.className = "tool";
    div.textContent = name;
    div.onclick = () => loadPage(name);
    pageList.appendChild(div);
  });
}

function createPage() {
  const name = "Page " + (Object.keys(pages).length + 1);
  pages[name] = [];
  loadPage(name);
}

/* ------------------------------
   CANVAS INFINI + TOUCH CONTROLS
--------------------------------*/
let offsetX = -24000;
let offsetY = -24000;
let scale = 1;

let isPanning = false;
let startX = 0, startY = 0;

function updateTransform() {
  canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

/* PAN AU DOIGT */
viewport.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    isPanning = true;
    startX = e.touches[0].clientX - offsetX;
    startY = e.touches[0].clientY - offsetY;
  }
});

/* PINCH ZOOM */
let lastDist = 0;

viewport.addEventListener("touchmove", e => {
  e.preventDefault();

  if (e.touches.length === 1 && isPanning) {
    offsetX = e.touches[0].clientX - startX;
    offsetY = e.touches[0].clientY - startY;
    updateTransform();
  }

  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (lastDist !== 0) {
      const delta = dist - lastDist;
      scale += delta * 0.002;
      scale = Math.min(Math.max(scale, 0.2), 3);
      updateTransform();
    }
    lastDist = dist;
  }
}, { passive: false });

viewport.addEventListener("touchend", () => {
  isPanning = false;
  lastDist = 0;
});

/* ------------------------------
   CREATION D’ELEMENTS
--------------------------------*/
function makeDraggable(el) {
  let dragging = false;
  let sx = 0, sy = 0, ex = 0, ey = 0;

  el.addEventListener("touchstart", e => {
    dragging = true;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    ex = parseFloat(el.style.left);
    ey = parseFloat(el.style.top);
    e.stopPropagation();
  });

  el.addEventListener("touchmove", e => {
    if (!dragging) return;
    const dx = (e.touches[0].clientX - sx) / scale;
    const dy = (e.touches[0].clientY - sy) / scale;
    el.style.left = ex + dx + "px";
    el.style.top = ey + dy + "px";
  });

  el.addEventListener("touchend", () => {
    dragging = false;
    saveCurrentPage();
  });
}

function saveCurrentPage() {
  if (!currentPage) return;
  pages[currentPage] = [...canvas.children].map(el => ({
    type: el.dataset.type,
    x: parseFloat(el.style.left),
    y: parseFloat(el.style.top),
    text: el.innerHTML,
    src: el.dataset.src || null
  }));
  savePages();
}

function restoreElement(data) {
  if (data.type === "text") createText(data.x, data.y, data.text);
  if (data.type === "shape") createShape(data.x, data.y);
  if (data.type === "image") createImage(data.x, data.y, data.src);
}

function createText(x, y, content = "Double-tap pour écrire") {
  const el = document.createElement("div");
  el.className = "node";
  el.dataset.type = "text";
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.innerHTML = content;
  el.ontouchstart = () => {};
  el.ondblclick = () => el.contentEditable = true;
  el.oninput = saveCurrentPage;
  canvas.appendChild(el);
  makeDraggable(el);
}

function createShape(x, y) {
  const el = document.createElement("div");
  el.className = "shape";
  el.dataset.type = "shape";
  el.style.left = x + "px";
  el.style.top = y + "px";
  canvas.appendChild(el);
  makeDraggable(el);
}

function createImage(x, y, src) {
  const el = document.createElement("img");
  el.className = "img-item";
  el.dataset.type = "image";
  el.dataset.src = src;
  el.src = src;
  el.style.left = x + "px";
  el.style.top = y + "px";
  canvas.appendChild(el);
  makeDraggable(el);
}

/* ------------------------------
   BOUTONS DU MENU
--------------------------------*/
addText.onclick = () => createText(25000, 25000);
addShape.onclick = () => createShape(25000, 25000);

addImage.onclick = () => fileInput.click();
fileInput.onchange = e => {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);
  createImage(25000, 25000, url);
  saveCurrentPage();
};

newPage.onclick = () => createPage();

toggleDark.onclick = () => {
  document.body.classList.toggle("dark");
};

/* ------------------------------
   INITIALISATION
--------------------------------*/
if (Object.keys(pages).length === 0) {
  createPage();
} else {
  loadPage(Object.keys(pages)[0]);
}

updateTransform();
</script>

</body>
</html>
